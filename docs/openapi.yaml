openapi: 3.0.3
info:
  title: BidFlow API
  description: >
    Backend de um sistema de leilão em tempo real. Este documento cobre a API
    REST; eventos WebSocket estão em docs/websocket-events.md, e o racional
    de cada decisão está em docs/adr/. Veja docs/architecture-walkthrough.md
    para uma leitura guiada do sistema inteiro.
  version: "1.0.0"
servers:
  - url: http://localhost:8000/api
    description: Ambiente local via docker-compose

tags:
  - name: Auth
  - name: Categories
  - name: Auctions
  - name: Bids
  - name: Profile
  - name: Activity
  - name: Notifications
  - name: Dashboard

security:
  - bearerAuth: []

paths:
  /register:
    post:
      tags: [Auth]
      summary: Registrar novo usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string, maxLength: 255 }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
      responses:
        "201":
          description: Usuário criado, token emitido com todas as abilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  token: { type: string }
        "422": { $ref: "#/components/responses/ValidationError" }

  /login:
    post:
      tags: [Auth]
      summary: Autenticar e obter um token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  token: { type: string }
        "401": { description: Credenciais inválidas }
        "403": { description: Usuário bloqueado }
        "429": { description: "Rate limit: 5 tentativas/minuto por ip+email" }

  /logout:
    post:
      tags: [Auth]
      summary: Revogar o token atual
      responses:
        "204": { description: Token revogado }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /me:
    get:
      tags: [Profile]
      summary: Perfil do usuário autenticado
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/UserProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /profile:
    patch:
      tags: [Profile]
      summary: Atualizar nome/email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name: { type: string, maxLength: 255 }
                email: { type: string, format: email }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /profile/avatar:
    post:
      tags: [Profile]
      summary: Enviar avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar: { type: string, format: binary }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [Profile]
      summary: Remover avatar
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }

  /profile/bids:
    get:
      tags: [Activity]
      summary: Histórico de lances do usuário autenticado
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        auction_id: { type: integer }
                        auction_name: { type: string }
                        amount: { type: string, example: "130.00" }
                        placed_at: { type: string, format: date-time }
                  meta: { $ref: "#/components/schemas/PageMeta" }

  /profile/auctions/won:
    get:
      tags: [Activity]
      summary: Leilões que o usuário venceu
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuctionActivityPage" }

  /profile/auctions/lost:
    get:
      tags: [Activity]
      summary: Leilões em que o usuário deu lance mas não venceu
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuctionActivityPage" }

  /rankings:
    get:
      tags: [Activity]
      summary: Ranking de compradores por número de leilões vencidos
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: integer }
                        name: { type: string }
                        wins: { type: integer }

  /notifications:
    get:
      tags: [Notifications]
      summary: Notificações do usuário autenticado
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Notification" }
                  meta: { $ref: "#/components/schemas/PageMeta" }

  /notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Marcar notificação como lida
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Notification" }
        "404": { description: "Não encontrada, ou pertence a outro usuário" }

  /dashboard/business:
    get:
      tags: [Dashboard]
      summary: Métricas de negócio (requer ability dashboard:read)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BusinessMetrics" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dashboard/technical:
    get:
      tags: [Dashboard]
      summary: Métricas técnicas (requer ability dashboard:read)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/TechnicalMetrics" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /categories:
    get:
      tags: [Categories]
      summary: Listar categorias
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Category" }

  /auctions:
    get:
      tags: [Auctions]
      summary: Listar leilões
      security: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: status
          in: query
          schema: { type: string, enum: [scheduled, active, closed, cancelled] }
        - name: category_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Auction" }
                  meta: { $ref: "#/components/schemas/PageMeta" }
    post:
      tags: [Auctions]
      summary: Criar leilão (requer ability auction:manage)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuctionInput" }
      responses:
        "201":
          description: Criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Auction" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /auctions/{id}:
    get:
      tags: [Auctions]
      summary: Ver um leilão
      security: []
      parameters: [{ $ref: "#/components/parameters/id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Auction" }
        "404": { description: Não encontrado }
    patch:
      tags: [Auctions]
      summary: Editar leilão (dono, só enquanto SCHEDULED)
      parameters: [{ $ref: "#/components/parameters/id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuctionUpdateInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Auction" }
        "403": { description: Não é o dono }
        "404": { description: Não encontrado }
        "422": { description: "Fora de SCHEDULED, ou payload inválido" }

  /auctions/{id}/activate:
    post:
      tags: [Auctions]
      summary: Ativar leilão (dono)
      parameters: [{ $ref: "#/components/parameters/id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Auction" }
        "403": { description: Não é o dono }
        "422": { description: Transição de status inválida }

  /auctions/{id}/cancel:
    post:
      tags: [Auctions]
      summary: Cancelar leilão (dono)
      parameters: [{ $ref: "#/components/parameters/id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Auction" }
        "403": { description: Não é o dono }
        "422": { description: Transição de status inválida }

  /auctions/{id}/live:
    get:
      tags: [Auctions]
      summary: Snapshot ao vivo — estado atual, espectadores, lances recentes
      security: []
      parameters:
        - $ref: "#/components/parameters/id"
        - name: after_bid_id
          in: query
          description: >
            Gap-fill de reconexão (ADR-0017): quando presente, recent_bids
            devolve tudo após este id de lance (até 200), em vez das últimas
            50 entradas do cache.
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  auction: { $ref: "#/components/schemas/Auction" }
                  viewer_count: { type: integer }
                  recent_bids:
                    type: array
                    items: { $ref: "#/components/schemas/BidFeedEntry" }
        "404": { description: Não encontrado }

  /auctions/{id}/bids:
    post:
      tags: [Bids]
      summary: Dar um lance (requer ability bid:place)
      parameters:
        - $ref: "#/components/parameters/id"
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number, minimum: 0, exclusiveMinimum: true }
      responses:
        "201":
          description: Lance aceito
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - { $ref: "#/components/schemas/BidFeedEntry" }
                      - type: object
                        properties:
                          auction:
                            type: object
                            properties:
                              status: { type: string }
                              current_value: { type: string }
                              participant_count: { type: integer }
        "404": { description: Leilão não encontrado }
        "422": { description: "Lance rejeitado (fechado, abaixo do mínimo, vendedor tentando dar lance no próprio leilão, bidder bloqueado)" }
        "429": { description: "Rate limit: 20 lances/minuto por usuário" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token Sanctum (não cookie/sessão — ver ADR-0004)

  parameters:
    id:
      name: id
      in: path
      required: true
      schema: { type: integer }
    page:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    perPage:
      name: per_page
      in: query
      schema: { type: integer, default: 15, maximum: 50 }

  responses:
    Unauthorized:
      description: Token ausente ou inválido
    Forbidden:
      description: Token válido, mas sem a ability necessária
    ValidationError:
      description: Payload inválido
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
              errors: { type: object }

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }

    UserProfile:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        avatar_path: { type: string, nullable: true }
        is_blocked: { type: boolean }

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }

    Auction:
      type: object
      properties:
        id: { type: integer }
        seller_id: { type: integer }
        category_id: { type: integer }
        name: { type: string }
        description: { type: string }
        currency: { type: string, example: USD }
        starting_bid: { type: string }
        minimum_increment: { type: string }
        buy_now_price: { type: string, nullable: true }
        reserve_price: { type: string, nullable: true }
        status: { type: string, enum: [scheduled, active, closed, cancelled] }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        current_value: { type: string }
        participant_count: { type: integer }
        view_count: { type: integer }
        extensions_count: { type: integer }
        winner_id: { type: integer, nullable: true }

    AuctionInput:
      type: object
      required: [category_id, name, description, starting_bid, minimum_increment, starts_at, ends_at]
      properties:
        category_id: { type: integer }
        name: { type: string, maxLength: 255 }
        description: { type: string }
        starting_bid: { type: number, minimum: 0, exclusiveMinimum: true }
        minimum_increment: { type: number, minimum: 0, exclusiveMinimum: true }
        buy_now_price: { type: number, nullable: true, description: "Deve ser > starting_bid" }
        reserve_price: { type: number, nullable: true, description: "Deve ser >= starting_bid" }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time, description: "Deve ser depois de starts_at" }

    AuctionUpdateInput:
      type: object
      required: [category_id, name, description, starts_at, ends_at]
      properties:
        category_id: { type: integer }
        name: { type: string, maxLength: 255 }
        description: { type: string }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }

    AuctionActivityPage:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              final_price: { type: string }
              winner_id: { type: integer, nullable: true }
              ends_at: { type: string, format: date-time }
        meta: { $ref: "#/components/schemas/PageMeta" }

    BidFeedEntry:
      type: object
      properties:
        id: { type: integer }
        bidder_id: { type: integer }
        amount: { type: string }
        placed_at: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, enum: [outbid, auction_won] }
        data: { type: object }
        read_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    BusinessMetrics:
      type: object
      properties:
        auctions:
          type: object
          properties:
            scheduled: { type: integer }
            active: { type: integer }
            closed: { type: integer }
            cancelled: { type: integer }
        total_bids: { type: integer }
        total_revenue: { type: string }
        live_viewers_total: { type: integer }
        generated_at: { type: string, format: date-time }

    TechnicalMetrics:
      type: object
      properties:
        websocket:
          type: object
          properties:
            connections: { type: integer }
        consumers:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              queue: { type: string }
              messages_ready: { type: integer }
              messages_unacknowledged: { type: integer }
              active_consumers: { type: integer }
              processed_total: { type: integer }
              avg_latency_ms: { type: integer }
        generated_at: { type: string, format: date-time }

    PageMeta:
      type: object
      properties:
        total: { type: integer }
        per_page: { type: integer }
        current_page: { type: integer }
